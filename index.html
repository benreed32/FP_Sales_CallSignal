<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CallSignal — Sales Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08090d;--bg2:#0e1018;--bg3:#141720;--border:#1e2230;--border2:#2a3044;
  --text:#e8eaf2;--text2:#8892a8;--text3:#4a5568;
  --blue:#3b82f6;--blue2:#1d4ed8;--green:#22c55e;--amber:#f59e0b;--red:#ef4444;--purple:#a855f7;
  --font:'Syne',sans-serif;--mono:'JetBrains Mono',monospace;
  --radius:10px;--radius-lg:16px;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden}

/* noise texture overlay */
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.4}

/* layout */
#app{position:relative;z-index:1}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;border-bottom:1px solid var(--border);background:rgba(8,9,13,.92);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--blue),var(--purple));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.logo-name{font-size:17px;font-weight:800;letter-spacing:-.02em}
.logo-sub{font-size:10px;color:var(--text3);font-family:var(--mono);letter-spacing:.08em;text-transform:uppercase;margin-top:1px}
.topbar-right{display:flex;align-items:center;gap:10px}
.content{padding:24px 28px;max-width:1400px;margin:0 auto}

/* tabs */
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:28px;overflow-x:auto}
.tab{padding:11px 18px;font-family:var(--font);font-size:13px;font-weight:600;color:var(--text3);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;letter-spacing:.01em}
.tab:hover{color:var(--text2)}
.tab.active{color:var(--blue);border-bottom-color:var(--blue)}
.tab-badge{background:var(--blue);color:#fff;border-radius:99px;padding:1px 6px;font-size:10px;margin-left:5px;font-family:var(--mono)}

/* buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:var(--radius);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;border:1px solid transparent;transition:all .15s;white-space:nowrap}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-primary:hover{background:var(--blue2)}
.btn-ghost{background:transparent;color:var(--text2);border-color:var(--border2)}
.btn-ghost:hover{background:var(--bg3);color:var(--text)}
.btn-danger{background:transparent;color:var(--red);border-color:var(--red)}
.btn-danger:hover{background:rgba(239,68,68,.1)}
.btn-green{background:var(--green);color:#000;border-color:var(--green)}
.btn-green:hover{opacity:.9}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-sm{padding:6px 12px;font-size:12px}

/* cards */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px 22px}
.card-sm{padding:14px 16px}

/* stat grid */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:24px}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.stat-label{font-size:10px;color:var(--text3);font-family:var(--mono);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}
.stat-value{font-size:26px;font-weight:700;font-family:var(--mono);line-height:1}
.stat-sub{font-size:11px;color:var(--text3);margin-top:4px}

/* score bar */
.score-bar-wrap{display:flex;align-items:center;gap:8px}
.score-bar-track{flex:1;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}
.score-bar-fill{height:100%;border-radius:3px;transition:width .5s ease}
.score-bar-num{font-size:12px;font-family:var(--mono);font-weight:500;min-width:24px;text-align:right}

/* tags */
.tag{display:inline-flex;align-items:center;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:500;font-family:var(--mono);border:1px solid var(--border);color:var(--text2);background:var(--bg3);cursor:default;transition:all .12s;white-space:nowrap}
.tag.clickable{cursor:pointer}
.tag.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.tag.won{background:rgba(34,197,94,.15);color:var(--green);border-color:rgba(34,197,94,.3)}
.tag.lost{background:rgba(239,68,68,.12);color:var(--red);border-color:rgba(239,68,68,.25)}
.tag.demo{background:rgba(59,130,246,.12);color:#60a5fa;border-color:rgba(59,130,246,.25)}
.tag.late{background:rgba(168,85,247,.12);color:#c084fc;border-color:rgba(168,85,247,.25)}
.tag.early{background:rgba(148,163,184,.1);color:var(--text2);border-color:var(--border2)}
.tags-row{display:flex;flex-wrap:wrap;gap:5px}

/* sentiment bar */
.sent-bar{display:flex;height:6px;border-radius:3px;overflow:hidden;width:100%}
.sent-pos{background:var(--green)}
.sent-neu{background:#334155}
.sent-neg{background:var(--red)}

/* table */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{padding:10px 14px;text-align:left;color:var(--text3);font-size:10px;font-family:var(--mono);letter-spacing:.07em;text-transform:uppercase;border-bottom:1px solid var(--border);white-space:nowrap;font-weight:500}
.tbl td{padding:12px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
.tbl tbody tr{cursor:pointer;transition:background .1s}
.tbl tbody tr:hover{background:var(--bg3)}
.tbl-wrap{overflow-x:auto;border-radius:var(--radius-lg);border:1px solid var(--border);background:var(--bg2)}

/* inputs */
input,textarea,select{font-family:var(--font);font-size:13px;color:var(--text);background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:10px 14px;outline:none;transition:border-color .15s;width:100%}
input:focus,textarea:focus,select:focus{border-color:var(--blue)}
input::placeholder,textarea::placeholder{color:var(--text3)}
label{display:block;font-size:11px;font-family:var(--mono);color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-group{margin-bottom:14px}

/* modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:28px;width:100%;max-width:580px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:18px;font-weight:700;margin-bottom:6px}
.modal-sub{font-size:13px;color:var(--text2);margin-bottom:22px;line-height:1.5}
.modal-close{background:none;border:none;color:var(--text3);cursor:pointer;font-size:20px;line-height:1;padding:4px}
.modal-close:hover{color:var(--text)}

/* progress / spinner */
.spinner{width:18px;height:18px;border:2px solid var(--border2);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;display:inline-block;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.progress-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--purple));border-radius:2px;transition:width .3s}

/* alerts */
.alert{padding:12px 14px;border-radius:var(--radius);font-size:13px;margin-bottom:14px;line-height:1.5}
.alert-info{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.25);color:#93c5fd}
.alert-success{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);color:#86efac}
.alert-warn{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.25);color:#fcd34d}
.alert-error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:#fca5a5}

/* mini donut */
.donut{transform:rotate(-90deg)}

/* radar */
.radar-wrap{display:flex;justify-content:center;align-items:center}

/* section headers */
.sec-title{font-size:11px;font-family:var(--mono);color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:14px}

/* call detail */
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
.detail-dim{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.detail-dim-label{font-size:12px;color:var(--text2)}

/* empty state */
.empty{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty-title{font-size:15px;font-weight:600;color:var(--text2);margin-bottom:6px}
.empty-sub{font-size:13px;line-height:1.5}

/* setup screen */
.setup-wrap{max-width:640px;margin:60px auto;padding:0 20px}
.setup-step{display:flex;gap:16px;margin-bottom:28px;padding-bottom:28px;border-bottom:1px solid var(--border)}
.setup-num{width:32px;height:32px;border-radius:50%;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;margin-top:2px}
.setup-body{flex:1}
.setup-title{font-size:15px;font-weight:700;margin-bottom:4px}
.setup-desc{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:12px}
.key-hint{font-size:11px;color:var(--blue);font-family:var(--mono);margin-top:6px}

/* responsive */
@media(max-width:640px){
  .topbar{padding:12px 16px}
  .content{padding:16px}
  .form-row{grid-template-columns:1fr}
  .detail-grid{grid-template-columns:1fr}
  .stat-grid{grid-template-columns:repeat(2,1fr)}
}

/* animations */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .25s ease forwards}
</style>
</head>
<body>
<div id="app"></div>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
const STATE = {
  gongKey: localStorage.getItem('cs_gong_key') || '',
  gongSecret: localStorage.getItem('cs_gong_secret') || '',
  anthropicKey: localStorage.getItem('cs_anthropic_key') || '',
  calls: JSON.parse(localStorage.getItem('cs_calls') || '[]'),
  accountList: JSON.parse(localStorage.getItem('cs_account_list') || '[]'), // [{accountName,rep,industry,acv,...}]
  activeTab: 'overview',
  activeTags: [],
  searchQuery: '',
  selectedCall: null,
  showSettings: false,
  showUpload: false,
  showGongSync: false,
  syncing: false,
  syncProgress: { current:0, total:0, status:'' },
  syncLog: [],
};

function save(key, val) { localStorage.setItem(key, typeof val === 'string' ? val : JSON.stringify(val)); }
function setState(patch) { Object.assign(STATE, patch); render(); }

// ─── Helpers ─────────────────────────────────────────────────────────────────
const avg = arr => arr.length ? Math.round(arr.reduce((a,b)=>a+b,0)/arr.length) : 0;
const fmtUSD = n => n>=1000 ? `$${(n/1000).toFixed(1)}k` : `$${Math.round(n)}`;
const scoreColor = s => s>=80?'#22c55e':s>=65?'#f59e0b':'#ef4444';
const healthLabel = h => h>=80?'Excellent':h>=65?'Good':h>=50?'Fair':'At Risk';
const stageTagColor = s => ({'closed-won':'won','demo-stage':'demo','late-stage':'late','early-stage':'early','closed-lost':'lost'}[s]||'early');

function acvBucket(n){
  if(!n||n===0) return 'Unknown ACV';
  if(n<5000) return 'ACV <$5k';
  if(n<10000) return 'ACV $5k-$10k';
  if(n<20000) return 'ACV $10k-$20k';
  if(n<40000) return 'ACV $20k-$40k';
  return 'ACV $40k+';
}
function empBucket(e){
  if(!e||e==='Unknown') return 'Unknown size';
  if(['1-2','3-5','6-10'].includes(e)) return '1-10 employees';
  if(['11-20','21-30'].includes(e)) return '11-30 employees';
  return '31+ employees';
}

// ─── CSV Parser ───────────────────────────────────────────────────────────────
function parseCSV(text){
  const lines = text.trim().split('\n');
  if(lines.length < 2) return [];
  const headers = lines[0].split(',').map(h => h.replace(/"/g,'').trim());
  return lines.slice(1).map(line => {
    const vals = [];
    let cur='', inQ=false;
    for(let c of line){
      if(c==='"') inQ=!inQ;
      else if(c===',' && !inQ){ vals.push(cur.trim()); cur=''; }
      else cur+=c;
    }
    vals.push(cur.trim());
    const obj={};
    headers.forEach((h,i) => obj[h] = (vals[i]||'').replace(/"/g,'').trim());
    return obj;
  }).filter(r => r['Account Name'] || r['accountName']);
}

function normalizeAccount(row){
  const name = row['Account Name'] || row['accountName'] || '';
  const rep = row['Opportunity Owner'] || row['rep'] || '';
  const industry = row['Industry'] || row['industry'] || '';
  const employees = row['Number of Employees'] || row['employees'] || '';
  const acv = parseFloat(row['Amount'] || row['acv'] || 0);
  const leadSource = row['Lead Source'] || row['leadSource'] || '';
  const stage = row['Stage'] || row['stage'] || '';
  let stageTag = 'early-stage';
  if(stage==='Closed Won') stageTag='closed-won';
  else if(stage.includes('Closed Lost')) stageTag='closed-lost';
  else if(stage.includes('Demo Sat')||stage.includes('Demo Booked')) stageTag='demo-stage';
  else if(stage.includes('Negotiation')||stage.includes('Dealhub')||stage.includes('Pending')) stageTag='late-stage';
  const tags = [acvBucket(acv), empBucket(employees), industry, leadSource, stageTag].filter(Boolean);
  return { accountName:name, rep, industry, employees, empBucket:empBucket(employees), acv, acvBucket:acvBucket(acv), leadSource, stage, stageTag, tags, probability: parseInt(row['Probability (%)'||0])||0 };
}

// ─── Gong API ─────────────────────────────────────────────────────────────────
// NOTE: Gong API requires server-side proxy due to CORS.
// The app will show instructions for setting up a minimal Vercel serverless proxy.
async function gongRequest(path, body, key, secret){
  const creds = btoa(`${key}:${secret}`);
  // In a Vercel deployment, calls go through /api/gong-proxy
  const res = await fetch('/api/gong-proxy', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ path, body, authorization: `Basic ${creds}` })
  });
  if(!res.ok) throw new Error(`Gong API error: ${res.status}`);
  return res.json();
}

async function syncGongCalls(){
  const { gongKey, gongSecret, anthropicKey, accountList } = STATE;
  if(!gongKey||!gongSecret) { alert('Please add your Gong credentials in Settings first.'); return; }
  if(!anthropicKey) { alert('Please add your Anthropic API key in Settings first.'); return; }
  if(!accountList.length) { alert('Please upload your account list CSV first.'); return; }

  setState({ syncing:true, syncProgress:{current:0,total:0,status:'Connecting...'}, syncLog:[] });

  // Build fast lookup map
  const accountMap = {};
  accountList.forEach(a => {
    const key = (a.accountName||'').toLowerCase().trim();
    if(key.length >= 3) accountMap[key] = a;
  });
  const accountNames = Object.keys(accountMap);

  function matchAccount(call){
    const title = (call.title||'').toLowerCase();
    
    // Check Salesforce CRM context - this is where Gong stores the account name
    const crmNames = [];
    (call.context||[]).forEach(ctx => {
      (ctx.objects||[]).forEach(obj => {
        // Salesforce Account object
        if(obj.objectType === 'Account' || obj.objectType === 'account'){
          (obj.fields||[]).forEach(f => {
            if(f.name === 'Name' || f.name === 'name' || f.name === 'AccountName'){
              if(f.value) crmNames.push(f.value.toLowerCase());
            }
          });
        }
        // Also grab any name field from any CRM object
        (obj.fields||[]).forEach(f => {
          if((f.name === 'Name' || f.name === 'name') && f.value){
            crmNames.push(f.value.toLowerCase());
          }
        });
      });
    });

    const parties = (call.parties||[]).map(p=>[
      p.name||'',
      p.emailAddress||'',
      p.organizationName||'',
      p.company||''
    ].join(' ')).join(' ').toLowerCase();

    const haystack = title + ' ' + parties + ' ' + crmNames.join(' ');

    for(const name of accountNames){
      if(name.length >= 3 && haystack.includes(name)) return accountMap[name];
    }
    return null;
  }

  // 30 day window — fast, covers active pipeline
  const from = new Date(); from.setDate(from.getDate()-60);
  const fromISO = from.toISOString();
  const toISO = new Date().toISOString();

  const newCalls = [...STATE.calls];
  const existingIds = new Set(newCalls.map(c=>c.id));
  const matchedCalls = [];

  try {
    addSyncLog('Fetching recent Gong calls (last 60 days)...');
    let cursor = null, page = 0, total = 0;

    do {
      const body = {
        filter:{ fromDateTime:fromISO, toDateTime:toISO },
        contentSelector:{
          context: 'Extended',
          exposedFields: {
            parties: true,
            context: true
          }
        }
      };
      if(cursor) body.cursor = cursor;
      const data = await gongRequest('/v2/calls/extensive', body, gongKey, gongSecret);
      const calls = data.calls || [];
      total += calls.length;
      page++;
      let hit = 0;



      for(const c of calls){
        if(existingIds.has(c.id)) continue;
        const acct = matchAccount(c);
        if(acct){ c._accountMeta = acct; matchedCalls.push(c); hit++; }
      }
      addSyncLog('Page '+page+': '+calls.length+' calls, '+hit+' matched (total matched: '+matchedCalls.length+')');
      setState({ syncProgress:{current:total,total:total,status:'Scanned '+total+' calls, '+matchedCalls.length+' matched...'} });
      cursor = data.records && data.records.cursor ? data.records.cursor : null;
      if(calls.length === 0) break;

      await new Promise(r=>setTimeout(r,150));
    } while(cursor);

    addSyncLog('Scan done. '+total+' total, '+matchedCalls.length+' matched your account list.');

    if(!matchedCalls.length){
      addSyncLog('No matches found. Make sure company names in your CSV match how they appear in Gong call titles or participant names.');
      setState({ syncing:false });
      return;
    }

    // Pull transcripts in batches of 10
    setState({ syncProgress:{current:0,total:matchedCalls.length,status:'Fetching transcripts...'} });
    addSyncLog('Fetching transcripts for '+matchedCalls.length+' calls...');
    const BATCH = 10;
    for(let i=0;i<matchedCalls.length;i+=BATCH){
      const batch = matchedCalls.slice(i,i+BATCH);
      const ids = batch.map(c=>c.id);
      let txData;
      try { txData = await gongRequest('/v2/calls/transcript',{filter:{callIds:ids}},gongKey,gongSecret); }
      catch(e){ addSyncLog('Transcript error: '+e.message); continue; }

      const txMap = {};
      (txData.callTranscripts||[]).forEach(t=>{
        txMap[t.callId] = (t.transcript||[]).map(u=>(u.sentences||[]).map(s=>s.text).join(' ')).join(' ');
      });

      for(const call of batch){
        const transcript = txMap[call.id];
        if(!transcript||transcript.trim().length<100){ addSyncLog('Skip (no transcript): '+(call.title||call.id)); continue; }
        const accountMeta = call._accountMeta;
        const ext = (call.parties||[]).find(p=>p.affiliation==='External');
        const companyName = accountMeta ? accountMeta.accountName : (ext ? ext.name : (call.title||''));
        const repParty = (call.parties||[]).find(p=>p.affiliation==='Internal');
        const repName = (accountMeta&&accountMeta.rep) ? accountMeta.rep : (repParty ? repParty.name : '');
        setState({ syncProgress:{current:i+1,total:matchedCalls.length,status:'Analyzing: '+companyName} });
        try {
          const analyzed = await analyzeWithClaude(transcript,{
            rep:repName, company:companyName,
            acv:accountMeta?accountMeta.acv:null,
            industry:accountMeta?accountMeta.industry:null,
            employees:accountMeta?accountMeta.employees:null,
            leadSource:accountMeta?accountMeta.leadSource:null,
            stage:accountMeta?accountMeta.stage:null,
          }, anthropicKey);
          const callObj = {
            id:call.id,
            date:(call.started||'').split('T')[0]||new Date().toISOString().split('T')[0],
            duration:Math.round((call.duration||0)/60),
            source:'gong',
            crmMeta:accountMeta||null,
            ...analyzed,
          };
          if(accountMeta){
            const crmTags = [accountMeta.acvBucket,accountMeta.empBucket,accountMeta.industry,accountMeta.leadSource,accountMeta.stageTag].filter(Boolean);
            callObj.tags = [...new Set([...(callObj.tags||[]),...crmTags])];
          }
          newCalls.push(callObj);
          existingIds.add(call.id);
          addSyncLog('Analyzed: '+callObj.company+' (Score: '+(callObj.scores&&callObj.scores.overall?callObj.scores.overall:'?')+')');
          save('cs_calls', newCalls);
          setState({ calls:[...newCalls], syncProgress:{current:i+1,total:matchedCalls.length,status:'Analyzing...'} });
        } catch(e){ addSyncLog('Failed: '+companyName+' - '+e.message); }
      }
    }
    addSyncLog('Sync complete!');
    setState({ syncing:false, calls:newCalls, syncProgress:{current:matchedCalls.length,total:matchedCalls.length,status:'Complete!'} });
    save('cs_calls', newCalls);
  } catch(e){
    addSyncLog('Error: '+e.message);
    setState({ syncing:false });
  }
}

function addSyncLog(msg){ STATE.syncLog = [...STATE.syncLog, `[${new Date().toLocaleTimeString()}] ${msg}`]; render(); }

// ─── Claude Analysis ──────────────────────────────────────────────────────────
async function analyzeWithClaude(transcript, meta, apiKey){
  const prompt = `You are a B2B SaaS sales call analyst. Analyze this transcript and return ONLY a JSON object. No markdown, no explanation.

Transcript:
"""
${transcript.slice(0,6000)}
"""

Context:
- Rep: ${meta.rep||'Unknown'}

  const res = await fetch('https://api.anthropic.com/v1/messages', {

    body: JSON.stringify({

// ─── Aggregation ──────────────────────────────────────────────────────────────
function getStats(calls){
  if(!calls.length) return null;
  const won = calls.filter(c=>c.closed);
  const byRep = groupBy(calls,'rep');
  const byIndustry = groupBy(calls,'industry');
  const bySize = groupBy(calls,'companySize');
  const avgDims = {};
  ['overall','discovery','demoStructure','differentiation','objectionHandling','personalization','pricingClose','rapport'].forEach(k=>{
    avgDims[k] = avg(calls.map(c=>c.scores?.[k]||0));
  });
  return {
    total:calls.length, won:won.length,
    winRate:Math.round((won.length/calls.length)*100),
    avgHealth:avg(calls.map(c=>c.healthScore||0)),
    avgOverall:avg(calls.map(c=>c.scores?.overall||0)),
    avgDuration:avg(calls.map(c=>c.duration||0)),
    avgSentiment:avg(calls.map(c=>Math.round((c.sentiment?.positive||0)*100))),
    totalACV: calls.reduce((s,c)=>s+(c.crmMeta?.acv||0),0),
    wonACV: won.reduce((s,c)=>s+(c.crmMeta?.acv||0),0),
    byRep: Object.entries(byRep).map(([rep,cs])=>({rep,count:cs.length,won:cs.filter(c=>c.closed).length,avgScore:avg(cs.map(c=>c.scores?.overall||0)),avgHealth:avg(cs.map(c=>c.healthScore||0)),winRate:Math.round((cs.filter(c=>c.closed).length/cs.length)*100),calls:cs})),
    byIndustry: Object.entries(byIndustry).map(([ind,cs])=>({ind,count:cs.length,avgScore:avg(cs.map(c=>c.scores?.overall||0)),winRate:Math.round((cs.filter(c=>c.closed).length/cs.length)*100)})),
    bySize: Object.entries(bySize).map(([sz,cs])=>({sz,count:cs.length,avgScore:avg(cs.map(c=>c.scores?.overall||0)),winRate:Math.round((cs.filter(c=>c.closed).length/cs.length)*100)})),
    avgDims,
  };
}
function groupBy(arr,key){ return arr.reduce((acc,x)=>{ const k=x[key]||'Unknown'; (acc[k]=acc[k]||[]).push(x); return acc; },{}); }

// ─── SVG Components ───────────────────────────────────────────────────────────
function donutSVG(val,size=48,sw=5,color){
  const c=scoreColor(val); const col=color||c;
  const r=(size-sw)/2; const circ=2*Math.PI*r; const dash=(val/100)*circ;
  return `<svg width="${size}" height="${size}" class="donut" style="display:block">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#1e2230" stroke-width="${sw}"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${col}" stroke-width="${sw}" stroke-dasharray="${dash} ${circ}" stroke-linecap="round"/>
  </svg>`;
}

function radarSVG(scores, size=200){
  const keys=['discovery','demoStructure','differentiation','objectionHandling','personalization','pricingClose','rapport'];
  const labels=['Disc.','Structure','Diff.','Objections','Personal.','Pricing','Rapport'];
  const cx=size/2,cy=size/2,r=size*.36;
  const ang=i=>(i/keys.length)*2*Math.PI-Math.PI/2;
  const pt=(i,v)=>[cx+r*(v/100)*Math.cos(ang(i)),cy+r*(v/100)*Math.sin(ang(i))];
  const gridLines=[20,40,60,80,100].map(v=>{
    const pts=keys.map((_,i)=>pt(i,v).join(',')).join(' ');
    return `<polygon points="${pts}" fill="none" stroke="#1e2230" stroke-width="0.7"/>`;
  }).join('');
  const axLines=keys.map((_,i)=>{const[x,y]=pt(i,100);return `<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="#1e2230" stroke-width="0.7"/>`;}).join('');
  const dataPts=keys.map((k,i)=>pt(i,scores[k]||0).join(',')).join(' ');
  const labelEls=keys.map((k,i)=>{const[x,y]=pt(i,118);return `<text x="${x}" y="${y}" text-anchor="middle" dominant-baseline="central" font-size="8.5" fill="#4a5568" font-family="JetBrains Mono,monospace">${labels[i]}</text>`;}).join('');
  const dotEls=keys.map((k,i)=>{const[x,y]=pt(i,scores[k]||0);return `<circle cx="${x}" cy="${y}" r="3" fill="#3b82f6"/>`;}).join('');
  return `<svg width="${size}" height="${size}" style="overflow:visible">
    ${gridLines}${axLines}
    <polygon points="${dataPts}" fill="rgba(59,130,246,.15)" stroke="#3b82f6" stroke-width="1.5"/>
    ${dotEls}${labelEls}
  </svg>`;
}

// ─── Render Helpers ───────────────────────────────────────────────────────────
function scoreBar(val,width='100%'){
  const c=scoreColor(val);
  return `<div class="score-bar-wrap"><div class="score-bar-track" style="width:${width}"><div class="score-bar-fill" style="width:${val}%;background:${c}"></div></div><span class="score-bar-num" style="color:${c}">${val}</span></div>`;
}
function sentBar(s){
  const t=s.positive+s.neutral+s.negative||1;
  return `<div class="sent-bar"><div class="sent-pos" style="width:${(s.positive/t)*100}%"></div><div class="sent-neu" style="width:${(s.neutral/t)*100}%"></div><div class="sent-neg" style="width:${(s.negative/t)*100}%"></div></div>`;
}
function tagHTML(label,extra='',cls=''){
  return `<span class="tag ${cls} ${extra}">${label}</span>`;
}
function outcomeTag(call){
  const cls = call.closed ? 'won' : call.outcome?.includes('Lost') ? 'lost' : call.outcome?.includes('Demo')||call.outcome?.includes('Follow') ? 'demo' : 'early';
  return tagHTML(call.outcome||'Unknown','',cls);
}

// ─── Modal: Gong Sync ─────────────────────────────────────────────────────────

  return `
  <div class="modal-overlay" onclick="if(event.target===this&&!STATE.syncing)setState({showGongSync:false})">
    <div class="modal" style="max-width:560px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <div class="modal-title">Sync from Gong</div>
        ${!syncing ? `<button class="modal-close" onclick="setState({showGongSync:false})">✕</button>` : ''}
      </div>
      <div class="modal-sub">Pulls calls only from accounts in your account list. Calls are matched by company name. Already-analyzed calls are skipped.</div>

      ${!syncing && !syncLog.length ? `
        <div class="alert alert-info">
          <strong>${STATE.accountList.length} accounts</strong> in your list. Gong will be searched for calls matching these companies from the last 180 days.
        </div>
        <div class="alert alert-warn">
          <strong>Before syncing:</strong> Make sure you've deployed the <code style="font-family:var(--mono);font-size:11px">api/gong-proxy.js</code> file to Vercel. Without it, Gong API calls will be blocked by the browser.
        </div>
        <div style="display:flex;gap:10px;margin-top:6px">
          <button class="btn btn-primary" onclick="syncGongCalls()">Start Sync</button>
          <button class="btn btn-ghost" onclick="setState({showGongSync:false})">Cancel</button>
        </div>` : ''}

      ${syncing ? `
        <div style="margin-bottom:16px">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
            <div class="spinner"></div>
            <span style="font-size:13px;color:var(--text2)">${syncProgress.status}</span>
          </div>
          ${syncProgress.total > 0 ? `
            <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
            <div style="font-size:11px;color:var(--text3);margin-top:4px;font-family:var(--mono)">${syncProgress.current} / ${syncProgress.total} calls</div>
          ` : ''}
        </div>` : ''}

      ${syncLog.length ? `
        <div style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:12px;max-height:220px;overflow-y:auto;font-family:var(--mono);font-size:11px;color:var(--text2);line-height:1.8">

        ${!syncing ? `<div style="display:flex;gap:10px;margin-top:14px">
          <button class="btn btn-ghost" onclick="setState({showGongSync:false,syncLog:[]})">Close</button>
        </div>` : ''}` : ''}

  </div>`;
}

// ─── Main Render ──────────────────────────────────────────────────────────────
function render(){
  const { activeTab, activeTags, searchQuery, selectedCall, showSettings, showUpload, showGongSync, gongKey, anthropicKey, calls, accountList } = STATE;
  const isSetup = !gongKey || !anthropicKey;

  // Filter calls
  const filtered = calls.filter(c => {
    if(activeTags.length && !activeTags.every(t=>(c.tags||[]).includes(t))) return false;
    if(searchQuery.trim()){
      const q = searchQuery.toLowerCase();
      const haystack = [c.company,c.rep,c.industry,c.outcome,...(c.tags||[]),c.notes].join(' ').toLowerCase();
      if(!haystack.includes(q)) return false;
    }
    return true;
  });

  const stats = getStats(filtered);
  const filterBadge = activeTags.length + (searchQuery.trim()?1:0);

  const tabs = [
    {id:'overview',label:'Overview'},
    {id:'reps',label:'By Rep'},
    {id:'industry',label:'By Industry'},
    {id:'calls',label:'All Calls'},
    {id:'accounts',label:'Account List'},
    {id:'search',label:'Search & Filter'},
    {id:'settings',label:'Settings'},
  ];

  const html = `
  <div id="app">
    <!-- Topbar -->
    <div class="topbar">
      <div class="logo">
        <div class="logo-icon">📞</div>
        <div><div class="logo-name">CallSignal</div><div class="logo-sub">Sales Intelligence</div></div>
      </div>
      <div class="topbar-right">
        ${filterBadge ? `<span style="font-size:12px;color:var(--blue);background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.2);padding:4px 10px;border-radius:99px">
          ${filterBadge} filter${filterBadge>1?'s':''} active
          <button onclick="setState({activeTags:[],searchQuery:''})" style="background:none;border:none;color:var(--red);cursor:pointer;margin-left:4px;font-size:12px">✕</button>
        </span>` : ''}
        <button class="btn btn-ghost btn-sm" onclick="setState({showUpload:true})">+ Manual Upload</button>
        <button class="btn btn-primary btn-sm" onclick="setState({showGongSync:true})">⟳ Sync Gong</button>
      </div>
    </div>

    <div class="content">
      ${isSetup && activeTab!=='settings' && activeTab!=='accounts' ? renderSetup() : `
        <!-- Tabs -->
        <div class="tabs">
          ${tabs.map(t=>`<button class="tab ${activeTab===t.id?'active':''}" onclick="setState({activeTab:'${t.id}'})">
            ${t.label}${t.id==='search'&&filterBadge?`<span class="tab-badge">${filterBadge}</span>`:''}
            ${t.id==='calls'&&filtered.length?`<span class="tab-badge">${filtered.length}</span>`:''}
          </button>`).join('')}
        </div>

        ${activeTab==='overview' ? renderOverview(filtered,stats||{total:0,won:0,winRate:0,avgHealth:0,avgOverall:0,avgDuration:0,avgSentiment:0,totalACV:0,wonACV:0,byRep:[],byIndustry:[],bySize:[],avgDims:{}}) : ''}
        ${activeTab==='reps' ? renderReps(filtered) : ''}
        ${activeTab==='industry' ? renderIndustry(filtered) : ''}
        ${activeTab==='calls' ? renderCalls(filtered) : ''}
        ${activeTab==='accounts' ? renderAccountList() : ''}
        ${activeTab==='search' ? renderSearch(filtered) : ''}
        ${activeTab==='settings' ? renderSettings() : ''}
      `}
    </div>

    ${selectedCall ? renderCallDetail(selectedCall) : ''}
    ${showGongSync ? renderGongSync() : ''}
    ${showUpload ? renderUploadModal() : ''}
  </div>`;

  document.getElementById('app').innerHTML = html;
}

// ─── Event Handlers ───────────────────────────────────────────────────────────
function toggleTag(t){
  const tags = STATE.activeTags.includes(t) ? STATE.activeTags.filter(x=>x!==t) : [...STATE.activeTags,t];
  setState({activeTags:tags});
}

function saveSettings(){
  const gk = (document.getElementById('s-gong-key')||document.getElementById('cfg-gong-key'))?.value?.trim()||STATE.gongKey;
  const gs = (document.getElementById('s-gong-secret')||document.getElementById('cfg-gong-secret'))?.value?.trim()||STATE.gongSecret;
  const ak = (document.getElementById('s-anth-key')||document.getElementById('cfg-anth-key'))?.value?.trim()||STATE.anthropicKey;
  save('cs_gong_key',gk); save('cs_gong_secret',gs); save('cs_anthropic_key',ak);
  setState({gongKey:gk,gongSecret:gs,anthropicKey:ak,activeTab:'accounts'});
}

function loadAccountCSV(input){
  const file = input.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const rows = parseCSV(e.target.result);
    const accounts = rows.map(normalizeAccount).filter(a=>a.accountName);
    save('cs_account_list', accounts);
    setState({accountList:accounts});
    alert(`✓ Loaded ${accounts.length} accounts from CSV`);
  };
  reader.readAsText(file);
}

function clearAccountList(){
  if(!confirm('Remove account list? This does not delete analyzed calls.')) return;
  save('cs_account_list','[]');
  setState({accountList:[]});
}

function clearAllData(){
  if(!confirm('Delete ALL analyzed call data? This cannot be undone.')) return;
  save('cs_calls','[]');
  setState({calls:[]});
}

function openCall(id){
  const c = STATE.calls.find(x=>x.id===id);
  if(c) setState({selectedCall:c});
}

function loadTranscriptFile(input){
  const file = input.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = e => { const ta = document.getElementById('u-text'); if(ta) ta.value = e.target.result; };
  reader.readAsText(file);
}

async function submitManualTranscript(){
  const text = document.getElementById('u-text')?.value?.trim();
  const rep = document.getElementById('u-rep')?.value?.trim();
  const company = document.getElementById('u-company')?.value?.trim();
  const industry = document.getElementById('u-industry')?.value?.trim();
  const acv = parseFloat(document.getElementById('u-acv')?.value||0);
  const employees = document.getElementById('u-emp')?.value?.trim();
  const leadSource = document.getElementById('u-ls')?.value?.trim();
  const statusEl = document.getElementById('upload-status');

  if(!text){ alert('Please paste a transcript first.'); return; }
  if(!STATE.anthropicKey){ alert('Add your Anthropic API key in Settings first.'); return; }

  if(statusEl) statusEl.innerHTML = `<div class="alert alert-info"><div class="spinner" style="display:inline-block;vertical-align:middle;margin-right:8px"></div>Analyzing with Claude…</div>`;

  try {
    const analyzed = await analyzeWithClaude(text, {rep,company,industry,acv,employees,leadSource}, STATE.anthropicKey);
    const crmMeta = {acv,industry,employees,leadSource,acvBucket:acvBucket(acv),empBucket:empBucket(employees)};
    const call = {
      id:'manual-'+Date.now(),
      date:new Date().toISOString().split('T')[0],
      source:'manual',
      crmMeta,
      ...analyzed,
    };
    const crmTags=[acvBucket(acv),empBucket(employees),industry,leadSource].filter(Boolean);
    call.tags=[...new Set([...(call.tags||[]),...crmTags])];
    const newCalls=[...STATE.calls,call];
    save('cs_calls',newCalls);
    setState({calls:newCalls,showUpload:false,activeTab:'calls'});
  } catch(e){
    if(statusEl) statusEl.innerHTML = `<div class="alert alert-error">Analysis failed: ${e.message}</div>`;
  }
}

// Make STATE accessible from inline onclick handlers
window.STATE = STATE;
window.setState = setState;
window.toggleTag = toggleTag;
window.saveSettings = saveSettings;
window.loadAccountCSV = loadAccountCSV;
window.clearAccountList = clearAccountList;
window.clearAllData = clearAllData;
window.openCall = openCall;
window.loadTranscriptFile = loadTranscriptFile;
window.submitManualTranscript = submitManualTranscript;
window.syncGongCalls = syncGongCalls;
window.addSyncLog = addSyncLog;

// ─── Init ─────────────────────────────────────────────────────────────────────
render();
</script>
